<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#2196F3">
    <meta name="mobile-web-app-capable" content="yes">
    <title>MediLab - Reports</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="theme-dark">
    <div class="d-flex">
        <div class="sidebar"></div>
        <div class="main flex-fill">
            <nav class="navbar navbar-expand-lg shadow-sm d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <button class="sidebar-toggle" id="sidebarToggle">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                    <span class="navbar-brand mb-0 h1"><i class="fas fa-file-medical text-primary pulse-neon"></i> Test Reports</span>
                </div>
                <!-- Profile Dropdown -->
                <div class="dropdown profile-dropdown">
                    <button class="btn btn-profile dropdown-toggle" type="button" id="profileMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <img src="https://ui-avatars.com/api/?name=User&background=00f2fe&color=000" alt="Profile" class="profile-avatar" id="navProfilePic">
                        <span class="profile-name" id="navProfileName">User</span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-right shadow-lg profile-menu" aria-labelledby="profileMenuButton">
                        <div class="dropdown-header d-flex align-items-center">
                            <div class="header-avatar mr-3">
                                <i class="fas fa-user-circle fa-2x text-primary"></i>
                            </div>
                            <div>
                                <h6 class="mb-0 text-white" id="menuProfileName">User</h6>
                                <small class="text-muted" id="menuProfileRole">Patient</small>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="profile.html"><i class="fas fa-user-edit text-primary"></i> Edit Profile</a>
                        <a class="dropdown-item" href="subscription.html"><i class="fas fa-crown text-warning"></i> Subscription / Pro</a>
                        <a class="dropdown-item" href="family.html"><i class="fas fa-users text-info"></i> Family Members</a>
                        <a class="dropdown-item" href="reports.html"><i class="fas fa-file-medical-alt text-danger"></i> Reports</a>
                        <a class="dropdown-item" href="history.html"><i class="fas fa-history text-secondary"></i> Profile History</a>
                        <a class="dropdown-item" href="settings.html"><i class="fas fa-cog text-light"></i> Settings</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </nav>
            <div class="container-fluid mt-4">
                <div class="card">
                    <div class="card-body">
                        <h2 class="card-title mb-4"><i class="fas fa-file-pdf text-primary"></i> Available Reports</h2>
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>User</th>
                                        <th>Test Name</th>
                                        <th>Lab</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="reportsTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Smart Summary Modal -->
    <div class="modal fade" id="aiSummaryModal" tabindex="-1" role="dialog" aria-labelledby="aiSummaryLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content card-holographic" style="background: rgba(11, 19, 36, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1.5px solid rgba(0, 242, 254, 0.25); border-radius: 20px; box-shadow: 0 10px 40px rgba(0, 242, 254, 0.2);">
                <div class="modal-header" style="border-bottom: 1px solid rgba(0, 242, 254, 0.15); padding: 20px;">
                    <h5 class="modal-title text-primary" id="aiSummaryLabel" style="font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.5rem; letter-spacing: 0.5px; display: flex; align-items: center;">
                        <i class="fas fa-robot pulse-neon mr-2"></i> MediLab AI Smart Report Summary
                    </h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close" style="opacity: 0.8; background: transparent; border: none; font-size: 1.5rem;">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body" style="padding: 25px; color: var(--text-main); max-height: 70vh; overflow-y: auto;">
                    <div id="aiSummaryContent">
                        <!-- Populated by JS -->
                    </div>
                </div>
                <div class="modal-footer" style="border-top: 1px solid rgba(0, 242, 254, 0.15); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;">
                    <div class="small text-muted"><i class="fas fa-shield-alt text-success"></i> HIPAA Compliant Patient Summary</div>
                    <button type="button" class="btn btn-outline-primary px-4" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 MediLab. All rights reserved.</p>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
