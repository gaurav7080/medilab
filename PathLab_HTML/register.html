<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLab - Register</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <a class="navbar-brand" href="#"><i class="fas fa-flask text-primary"></i> MediLab</a>
    </nav>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4"><i class="fas fa-user-plus text-primary"></i> Register for MediLab</h2>
                        <form onsubmit="register(event)">
                            <div class="form-group">
                                <label for="name"><i class="fas fa-user"></i> Full Name</label>
                                <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
                            </div>
                            <div class="form-group">
                                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                            </div>
                            <div class="form-group">
                                <label for="password"><i class="fas fa-lock"></i> Password</label>
                                <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                            </div>
                            <div class="form-group">
                                <label for="roleSelect"><i class="fas fa-user-tag"></i> Register As</label>
                                <select id="roleSelect" class="form-control" onchange="toggleLabFields()">
                                    <option value="Patient">Patient</option>
                                    <option value="Admin">PathLab Admin</option>
                                </select>
                            </div>

                            <!-- Lab Registration Fields -->
                            <div id="labFields" style="display:none;">
                                <div class="form-group">
                                    <label for="labName"><i class="fas fa-hospital"></i> Lab Name</label>
                                    <input type="text" id="labName" class="form-control" placeholder="Enter lab name" maxlength="100">
                                </div>
                                <div class="form-group">
                                    <label for="labLocation"><i class="fas fa-map-marker-alt"></i> Lab Location</label>
                                    <input type="text" id="labLocation" class="form-control" placeholder="Enter lab location (City, State)" maxlength="100">
                                </div>
                                <div class="form-group">
                                    <label for="labGST"><i class="fas fa-file-receipt"></i> GST Number</label>
                                    <input type="text" id="labGST" class="form-control" placeholder="GSTIN (e.g., 27AABAU1234R0Z0)" pattern="^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$" maxlength="15">
                                </div>
                                <div class="form-group">
                                    <label for="labId"><i class="fas fa-id-badge"></i> Lab ID / License Number</label>
                                    <input type="text" id="labId" class="form-control" placeholder="Enter lab ID or license number" maxlength="50">
                                </div>
                                <div class="form-group">
                                    <label for="labPhone"><i class="fas fa-phone"></i> Lab Phone</label>
                                    <input type="tel" id="labPhone" class="form-control" placeholder="Enter lab phone number" pattern="^[0-9]{10}$" maxlength="10">
                                </div>
                                <div class="form-group">
                                    <label for="labProfile"><i class="fas fa-file-alt"></i> Lab Profile / Description</label>
                                    <textarea id="labProfile" class="form-control" placeholder="Describe your lab, services offered, qualifications, etc." rows="3" maxlength="500"></textarea>
                                </div>
                                <div class="alert alert-info" role="alert">
                                    <strong><i class="fas fa-info-circle"></i> Note:</strong> Your lab information will be verified by admin before approval.
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-user-plus"></i> Register</button>
                        </form>
                        <div class="text-center mt-3">
                            <p>Already have an account? <a href="index.html">Login here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <p>&copy; 2026 MediLab. All rights reserved.</p>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
