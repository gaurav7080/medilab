<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#2196F3">
    <meta name="mobile-web-app-capable" content="yes">
    <title>MediLab - Book Test</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div class="d-flex">
        <div class="sidebar"></div>
        <div class="main flex-fill">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <span class="navbar-brand mb-0 h1"><i class="fas fa-plus-circle text-primary"></i> Book Test</span>
            </nav>
            <div class="container-fluid mt-4">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body">
                                <h2 class="card-title text-center mb-4"><i class="fas fa-flask text-primary"></i> Book a Test</h2>
                                <form onsubmit="bookTest(event)">
                                    <div class="form-group">
                                        <label for="labSelect"><i class="fas fa-hospital"></i> Select Path Lab</label>
                                        <select id="labSelect" class="form-control" required>
                                            <option value="">Select Lab</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="testName"><i class="fas fa-vial"></i> Test Name</label>
                                        <input type="text" id="testName" class="form-control" placeholder="Enter test name (e.g., Blood Test, X-Ray)" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-calendar-check"></i> Book Test</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <p>&copy; 2026 MediLab. All rights reserved.</p>
    </footer>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
